<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;

  background:
  radial-gradient(circle at bottom,
  rgba(255,0,80,.45),
  transparent 35%),
  linear-gradient(180deg,#170000,#000000);
}

.container{
  width:min(390px,92vw);
  text-align:center;
}

.logo{
  width:340px;
  max-width:96%;
  display:block;
  margin:0 auto 10px auto;
  filter:drop-shadow(0 0 18px rgba(255,0,0,.8));
}

.vip-btn{
  display:inline-block;
  margin-bottom:18px;
  padding:10px 28px;
  border-radius:30px;
  border:2px solid #ffcc00;
  color:#ffcc00;
  font-weight:900;
  background:rgba(0,0,0,.35);
}

.card{
  background:

  145deg,
  #d40000 0%,
  #ff2a2a 55%,
  #ffcc00 100%
  );

  border:2px solid white;
  border-radius:24px;
  padding:30px 22px;
  box-shadow:
  0 0 35px rgba(255,0,0,.55);
}

.card h2{
  margin:0 0 15px;
  font-size:32px;
  line-height:1.1;
  text-shadow:2px 2px 0 #7a0000;
}

.card p{
  margin:0 0 22px;
  font-size:17px;
  line-height:1.35;
  font-weight:700;
}

.whatsapp-btn{
  display:block;
  text-decoration:none;
  color:white;
  font-size:24px;
  font-weight:1000;

  padding:21px 18px;

  border-radius:40px;

  border:3px solid white;

  background:
  linear-gradient(
  90deg,
  #00ff5a,
  #00b83f
  );

  box-shadow:
  0 0 28px rgba(0,255,90,.85);

  animation:pulse 1.2s infinite;
}

.small{
  margin-top:14px;
  font-size:13px;
  font-weight:900;
}

@keyframes pulse{
  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.04);
  }
